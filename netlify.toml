[build]
  command   = "pnpm install --frozen-lockfile && pnpm run production"
  publish   = "public"

[build.environment]
  NODE_VERSION = "18"
  PNPM_VERSION = "8"

# Cache node_modules between builds for faster installs
[build.processing]
  skip_processing = false

[[headers]]
  for = "/app.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
